name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP & Node
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies & Build
        run: |
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build

      - name: Zip files
        run: |
          # Create zip excluding unnecessary files
          zip -r deploy.zip . -x "*.git*" "node_modules/*" ".github/*" "storage/logs/*" "tests/*" "deploy.zip" "extract.php"
          ls -lh deploy.zip

      - name: Upload to cPanel via FTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          # Clean FTP_SERVER of any ftp:// or ftps:// prefix
          CLEAN_SERVER=$(echo "$FTP_SERVER" | sed -E 's#^(ftp://|ftps://)##')

          echo "Uploading deploy.zip to ftp://$CLEAN_SERVER/..."
          curl --ftp-create-dirs --ssl -k -T deploy.zip -u "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$CLEAN_SERVER/deploy.zip"

          echo "Uploading extract.php helper..."
          curl --ftp-create-dirs --ssl -k -T extract.php -u "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$CLEAN_SERVER/extract.php"

      - name: Trigger Remote Extraction
        env:
          SITE_URL: ${{ secrets.FTP_SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "Error: SITE_URL secret is not set. Cannot trigger extraction."
            exit 1
          fi
          
          # Trigger the PHP script with the security token
          echo "Triggering extraction at $SITE_URL/extract.php..."
          curl -s "$SITE_URL/extract.php?token=youssi_market_deploy_2026"
          
          # Delete the local helper
          # curl --ssl -k -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" "ftp://$(echo "${{ secrets.FTP_SERVER }}" | sed -E 's#^(ftp://|ftps://)##')/" -X "DELE extract.php"
