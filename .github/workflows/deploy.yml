name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP & Node
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies & Build
        run: |
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build

      - name: Zip files
        run: |
          zip -r deploy.zip . -x "*.git*" "node_modules/*" ".github/*" "storage/logs/*" "tests/*" "deploy.zip"
          ls -lh deploy.zip

      - name: Upload to cPanel via FTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          # Clean FTP_SERVER of any ftp:// or ftps:// prefix to prevent double prefixing
          CLEAN_SERVER=$(echo "$FTP_SERVER" | sed -E 's#^(ftp://|ftps://)##')

          echo "Uploading deploy.zip to ftp://$CLEAN_SERVER/deploy.zip..."
          curl --ftp-create-dirs --ssl -k -T deploy.zip -u "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$CLEAN_SERVER/deploy.zip"

          if [ -f deploy.php ]; then
            echo "Uploading deploy.php to ftp://$CLEAN_SERVER/deploy.php..."
            curl --ftp-create-dirs --ssl -k -T deploy.php -u "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$CLEAN_SERVER/deploy.php"
          fi
          if [ -f test_deploy.php ]; then
            echo "Uploading test_deploy.php to ftp://$CLEAN_SERVER/test_deploy.php..."
            curl --ftp-create-dirs --ssl -k -T test_deploy.php -u "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$CLEAN_SERVER/test_deploy.php"
          fi
